<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Rubedo Stromkreis — drei Säulen, von innen nach außen">
  <defs>
    <radialGradient id="paper" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#FAF3E7"/>
      <stop offset="100%" stop-color="#F0E6D5"/>
    </radialGradient>
    <pattern id="grain" patternUnits="userSpaceOnUse" width="120" height="120">
      <rect width="120" height="120" fill="url(#paper)"/>
      <circle cx="20" cy="40" r="0.6" fill="#5C1A1B" opacity="0.04"/>
      <circle cx="80" cy="20" r="0.5" fill="#5C1A1B" opacity="0.03"/>
      <circle cx="60" cy="100" r="0.7" fill="#5C1A1B" opacity="0.04"/>
      <circle cx="100" cy="80" r="0.5" fill="#5C1A1B" opacity="0.03"/>
      <circle cx="40" cy="80" r="0.6" fill="#5C1A1B" opacity="0.03"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="url(#grain)"/>

  <!-- Soft circular flow connecting the three nodes -->
  <g fill="none" stroke="#5C1A1B" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer flowing curve through the three points -->
    <path d="M 320 460 C 320 280, 480 200, 600 220 C 720 240, 880 280, 880 460 C 880 600, 720 640, 600 620 C 480 600, 320 600, 320 460 Z" stroke-width="1.4" opacity="0.32"/>
    <!-- Inner flowing line — the actual circuit, as continuous curve through the three nodes -->
    <path d="M 380 480 Q 470 320, 600 320 Q 730 320, 820 480 Q 730 580, 600 560 Q 470 580, 380 480 Z" stroke-width="1.6" opacity="0.55"/>
  </g>

  <!-- Three nodes (Säulen): Innen, Aktivierung, Balance -->
  <!-- Node 1 — Innen (links) -->
  <g transform="translate(380, 480)">
    <circle r="14" fill="#5C1A1B"/>
    <circle r="22" fill="none" stroke="#5C1A1B" stroke-width="0.8" opacity="0.4"/>
    <circle r="32" fill="none" stroke="#5C1A1B" stroke-width="0.5" opacity="0.2"/>
  </g>
  <!-- Node 2 — Aktivierung (oben mitte) -->
  <g transform="translate(600, 320)">
    <circle r="14" fill="#5C1A1B"/>
    <circle r="22" fill="none" stroke="#5C1A1B" stroke-width="0.8" opacity="0.4"/>
    <circle r="32" fill="none" stroke="#5C1A1B" stroke-width="0.5" opacity="0.2"/>
  </g>
  <!-- Node 3 — Balance (rechts) -->
  <g transform="translate(820, 480)">
    <circle r="14" fill="#5C1A1B"/>
    <circle r="22" fill="none" stroke="#5C1A1B" stroke-width="0.8" opacity="0.4"/>
    <circle r="32" fill="none" stroke="#5C1A1B" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Tiny diamond accents — wie auf der Site -->
  <g fill="#8A6E3F" opacity="0.6">
    <path d="M 600 240 l 4 4 l -4 4 l -4 -4 z"/>
    <path d="M 290 480 l 4 4 l -4 4 l -4 -4 z"/>
    <path d="M 910 480 l 4 4 l -4 4 l -4 -4 z"/>
  </g>

  <!-- Eyebrow labels — sehr subtil, nur als angedeutete Markierungen -->
  <g font-family="Outfit, system-ui, sans-serif" font-size="14" fill="#5C1A1B" opacity="0.7" text-anchor="middle" letter-spacing="2">
    <text x="380" y="540">INNEN</text>
    <text x="600" y="270">AKTIVIERUNG</text>
    <text x="820" y="540">BALANCE</text>
  </g>

  <!-- Bottom claim eyebrow -->
  <g font-family="Cormorant Garamond, Georgia, serif" font-style="italic" font-size="20" fill="#5C1A1B" opacity="0.55" text-anchor="middle">
    <text x="600" y="720">von innen nach außen</text>
  </g>
</svg>
